---
listenAddr: 0.0.0.0:3000
log:
  level: trace
discourse:
  server: https://meta.discourse.com
  secret: <replace-me>
oidc:
  # The issuer URL advertised in OIDC discovery and ID tokens.
  # Must be the public base URL of the /oauth2 path of this server.
  issuer: https://distrust.example.org/oauth2

  # 32-byte global secret used by fosite to sign opaque tokens.
  # Must be EXACTLY 32 bytes long. Generate with e.g.:
  #   openssl rand -hex 16
  secret: <replace-me-with-32-byte-secret>

  # RSA private key (PEM, PKCS#1) used to sign ID tokens.
  # Generate with: ./distrust genkey > distrust.key
  # then paste the PEM block here under privateKey: |
  privateKey: |
    -----BEGIN RSA PRIVATE KEY-----
    <replace-me>
    -----END RSA PRIVATE KEY-----

# Optional list of trusted reverse-proxy CIDRs/IPs.
# Only requests originating from these addresses may set X-Forwarded-Proto.
# Leave empty (or omit) when running directly without a proxy.
# trustedProxies:
#   - 127.0.0.1/32
#   - 10.0.0.0/8

clients:
  test:
    secret: foobar
    allowGroups: ['team']
    redirectURIs:
      - 'https://openidconnect.net/callback'
